<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#070a12" />
  <title>Nemotron Chat</title>
  <link rel="stylesheet" href="css/app.css" />
</head>
<body>
  <div id="app">
    <aside id="drawer" class="drawer">
      <div class="brand">
        <div class="logo">N</div>
        <div>
          <h1>Nemotron Chat</h1>
          <p>Mobile app corrigido</p>
        </div>
      </div>

      <button id="newChatBtn" class="primary">+ Novo chat</button>

      <div class="panel">
        <label>API Key NVIDIA</label>
        <input id="apiKey" type="password" placeholder="nvapi-..." />

        <label>Modelo</label>
        <select id="model">
          <option value="nvidia/nemotron-3-ultra-550b-a55b">Nemotron 3 Ultra 550B</option>
          <option value="nvidia/nemotron-3-super-120b-a12b">Nemotron 3 Super 120B</option>
          <option value="nvidia/nemotron-3-nano-30b-a3b">Nemotron 3 Nano 30B</option>
          <option value="nvidia/llama-3.1-nemotron-ultra-253b-v1">Llama 3.1 Nemotron Ultra 253B</option>
          <option value="nvidia/llama-3.1-nemotron-70b-instruct">Llama 3.1 Nemotron 70B</option>
          <option value="mistralai/mistral-nemotron">Mistral Nemotron</option>
        </select>

        <label>Modo de resposta</label>
        <select id="mode">
          <option value="curto">Curto</option>
          <option value="medio" selected>Médio</option>
          <option value="profundo">Profundo</option>
        </select>

        <label>Tokens</label>
        <select id="tokens">
          <option value="800">800</option>
          <option value="1600" selected>1600</option>
          <option value="3000">3000</option>
        </select>

        <label>Personalidade</label>
        <textarea id="persona"></textarea>
      </div>

      <h2 class="small-title">Conversas</h2>
      <div id="chatList" class="chat-list"></div>

      <div class="bottom-actions">
        <button id="exportBtn" class="secondary">Exportar</button>
        <button id="clearBtn" class="danger">Apagar</button>
      </div>
    </aside>

    <div id="overlay" class="overlay"></div>

    <main class="chat">
      <header class="top">
        <button id="menuBtn" class="icon">☰</button>
        <div>
          <h1 id="title">Novo chat</h1>
          <p id="subtitle">Pronto</p>
        </div>
      </header>

      <section id="messages" class="messages"></section>

      <section class="quickbar">
        <button data-fill="Corrija esse erro e mande o código final: ">Corrigir erro</button>
        <button data-fill="Crie um app completo sobre: ">Criar app</button>
        <button data-fill="Resuma em tópicos: ">Resumir</button>
        <button data-fill="Aja como agente de código e resolva: ">Code</button>
      </section>

      <footer class="composer">
        <textarea id="input" placeholder="Digite sua mensagem..." rows="1"></textarea>
        <button id="sendBtn">➤</button>
      </footer>
    </main>
  </div>

  <div id="toast"></div>
  <script src="js/app.js"></script>
</body>
</html>
